# Server Configuration
server.port=${PORT:8080}

# Database Configuration (supports local fallback and Railway env variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eduloan_navigator?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT Configuration
app.jwt.secret=${JWT_SECRET:9a4f2c8d3e1b7f0a5c8b2d1e4f3a6b5c9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4a}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha

# Logging Configuration
logging.level.org.springframework.security=INFO
logging.level.com.eduloan.navigator=DEBUG
